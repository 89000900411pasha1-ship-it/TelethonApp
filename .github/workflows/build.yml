name: Build Windows Executable

on:
  push:
    branches: [ "main" ] # Запускать при загрузке кода в главную ветку

jobs:
  build:
    runs-on: windows-latest # Использовать чистую Windows

    steps:
    - name: 1. Checkout repository
      uses: actions/checkout@v3 # Скачиваем ваш код

    - name: 2. Set up Python
      uses: actions/setup-python@v4 # Устанавливаем Python
      with:
        python-version: '3.11' # Указываем ту же версию, что и у вас

    - name: 3. Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter telethon # Устанавливаем все библиотеки

    - name: 4. Download sqlite3.dll
      run: |
        curl -L -o sqlite3.dll.zip https://www.sqlite.org/2024/sqlite-dll-win64-x64-3460000.zip
        7z x sqlite3.dll.zip
        del sqlite3.dll.zip
        # Переименовываем папку в sqlite3, чтобы найти dll
        move sqlite-dll-win64-x64-3460000 sqlite3
        move sqlite3/sqlite3.dll .

    - name: 5. Run the build script
      run: python build.py # Запускаем ваш скрипт сборки

    - name: 6. Upload artifact
      uses: actions/upload-artifact@v3 # Загружаем результат
      with:
        name: TelethonManager-Windows
        path: TelethonManager_v1.6.0/ # Название папки, которую создает ваш build.py
