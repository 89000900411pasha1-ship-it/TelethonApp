name: Build Windows Executable

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Checkout repository
      uses: actions/checkout@v4

    - name: 2. Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter telethon

    # Шаг 4 (скачивание) больше не нужен, так как файл уже в репозитории

    - name: 4. Run the build script
      run: python build.py # Наш build.py уже умеет находить sqlite3.dll в папке

    - name: 5. Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TelethonManager-Windows
        path: TelethonManager_v1.6.0/
